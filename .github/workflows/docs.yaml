name: Deploy documentation site to GitHub Pages

on:
  push:
    branches: [trunk]
    paths: [docs/**]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Cache node_modules and only invalidate it if package-lock.json changes
      - name: Check for cached dependencies
        uses: actions/cache@v3
        id: cache-deps
        with:
          path: node_modules
          key: docs-${{ runner.os }}-deps-${{ hashFiles('docs/**/package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      # Cache the build and only invalidate it if the source code changes
      - name: Check for cached build
        uses: actions/cache@v3
        id: cache-dist
        with:
          path: dist
          key: |
            docs-${{ runner.os }}-dist-${{ hashFiles(
              'docs/public/**',
              'docs/src/**',
              'docs/**/*.mjs',
              'docs/**/*.json'
            ) }}
      - name: Build project
        if: steps.cache-dist.outputs.cache-hit != 'true'
        run: npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: jjj.isaaccorbrey.com

    steps:
      # Deploy build to Netlify with commit message
      - name: Deploy to Netlify
        run: |
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -n 1)
          COMMIT_MSG="${COMMIT_MSG//\"/\\\"}"
          npx netlify-cli@17 deploy \
            --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} \
            --site=${{ secrets.NETLIFY_SITE_ID }} \
            --message="$COMMIT_MSG" \
            --dir=docs/dist \
            --prod
